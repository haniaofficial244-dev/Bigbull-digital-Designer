<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigBull Digital | Student Portal</title>
    <style>
        :root { --primary: #004d40; --accent: #FFD700; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Main Container */
        main { background: white; width: 90%; max-width: 500px; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        
        header { text-align: center; margin-bottom: 2rem; }
        header h1 { color: var(--primary); margin: 0; font-size: 1.8rem; }
        header p { color: #666; font-size: 0.9rem; }

        /* Task Navigation */
        .task-control { display: flex; align-items: center; gap: 10px; background: #eee; padding: 10px; border-radius: 10px; margin-bottom: 1.5rem; }
        .nav-btn { background: var(--primary); color: var(--accent); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        select { flex-grow: 1; padding: 8px; border: none; border-radius: 5px; background: transparent; font-size: 1rem; outline: none; }

        /* Form Elements */
        section form { display: flex; flex-direction: column; gap: 12px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline-color: var(--primary); }
        button#submitBtn { padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button#submitBtn:hover { background: #00332a; opacity: 0.9; }

        /* Submissions Table */
        footer { margin-top: 2rem; border-top: 1px solid #eee; padding-top: 1rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: var(--primary); padding-bottom: 10px; }
        td { padding: 10px 0; border-bottom: 1px solid #f9f9f9; }
        .badge { background: var(--accent); padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<main>
    <header>
        <h1>BigBull Digital</h1>
        <p>Graphic Designing Student Portal</p>
    </header>

    <section>
        <div class="task-control">
            <button class="nav-btn" onclick="changeTask(-1)">&#8592;</button>
            <select id="taskPicker" onchange="refreshData()"></select>
            <button class="nav-btn" onclick="changeTask(1)">&#8594;</button>
        </div>

        <form id="submissionForm" onsubmit="event.preventDefault(); sendData();">
            <input type="text" id="nameInput" placeholder="Apna Pura Naam Likhen" required>
            <input type="url" id="linkInput" placeholder="Design Link (Canva/Drive)" required>
            <button type="submit" id="submitBtn">Submit My Task</button>
        </form>
    </section>

    <footer>
        <h3 id="tableTitle" style="font-size: 1rem; color: #444;">Submissions</h3>
        <table>
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Link</th>
                    <th>Marks</th>
                </tr>
            </thead>
            <tbody id="dataTableBody">
                </tbody>
        </table>
    </footer>
</main>

<script>
    // 1. https://script.google.com/macros/s/AKfycbyxgYo6gqQ5t4loV83vgG01chMizapPx12YHAO2WVlgJHRew9RSXJb3D6oQx_IFCbTdTg/exec
    const scriptURL ='https://script.google.com/macros/s/AKfycbyxgYo6gqQ5t4loV83vgG01chMizapPx12YHAO2WVlgJHRew9RSXJb3D6oQx_IFCbTdTg/exec'; 
    const picker = document.getElementById('taskPicker');

    // 2. Task List 1 to 20 generate karna
    for (let i = 1; i <= 20; i++) {
        let opt = document.createElement('option');
        opt.value = "Task " + i;
        opt.innerHTML = "Task " + i;
        picker.appendChild(opt);
    }

    // 3. Arrow buttons function
    function changeTask(step) {
        let newIdx = picker.selectedIndex + step;
        if (newIdx >= 0 && newIdx < 20) {
            picker.selectedIndex = newIdx;
            refreshData();
        }
    }

    // 4. Data submit karna
    function sendData() {
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Sending...";
        btn.disabled = true;

        const payload = {
            name: document.getElementById('nameInput').value,
            link: document.getElementById('linkInput').value,
            task: picker.value
        };

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert("Task Submit Ho Gaya!");
            btn.innerText = "Submit My Task";
            btn.disabled = false;
            document.getElementById('submissionForm').reset();
            refreshData();
        })
        .catch(err => alert("Error: " + err));
    }

    // 5. Data load aur filter karna
    function refreshData() {
        const currentTask = picker.value;
        document.getElementById('tableTitle').innerText = "Submissions: " + currentTask;
        const tbody = document.getElementById('dataTableBody');
        tbody.innerHTML = "<tr><td colspan='3'>Loading...</td></tr>";

        fetch(scriptURL)
        .then(res => res.json())
        .then(data => {
            tbody.innerHTML = "";
            // Row 0 header hoti hai, isliye slice(1)
            data.slice(1).forEach(row => {
                if(row[1] === currentTask) {
                    let tr = `<tr>
                        <td>${row[0]}</td>
                        <td><a href="${row[2]}" target="_blank">View</a></td>
                        <td><span class="badge">${row[3] || 'Pending'}</span></td>
                    </tr>`;
                    tbody.innerHTML += tr;
                }
            });
            if(tbody.innerHTML === "") {
                tbody.innerHTML = "<tr><td colspan='3'>No one submitted yet.</td></tr>";
            }
        });
    }

    // Pehli baar load karne par
    window.onload = refreshData;
</script>

</body>
</html>
